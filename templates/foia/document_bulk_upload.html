{% extends foia_base_template %}

{% block title %}Bulk Upload — {{ foia_brand }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <h2 class="h4 mb-4">
      <i class="bi bi-cloud-arrow-up me-2"></i>Bulk Upload Documents
    </h2>

    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="mb-3">
            <label for="files" class="form-label fw-semibold">Select Files</label>
            <input type="file" name="files" id="files" class="form-control" multiple required>
            <div class="form-text">Select multiple files to upload at once. Titles will be derived from filenames.</div>
          </div>

          <div class="mb-3">
            <label for="source" class="form-label fw-semibold">Source (optional)</label>
            <input type="text" name="source" id="source" class="form-control"
                   placeholder="e.g. Legal Department, HR Records">
            <div class="form-text">Applied to all uploaded documents.</div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-cloud-arrow-up me-1"></i>Upload All
            </button>
            <a href="{% url 'foia:document_list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
